<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Arsip DPM FH-UH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dpm-blue: #002D5E;
            --dpm-red: #B90000;
        }
        .bg-dpm-blue { background-color: var(--dpm-blue); }
        .bg-dpm-red { background-color: var(--dpm-red); }
        .text-dpm-red { color: var(--dpm-red); }
        .border-dpm-red { border-color: var(--dpm-red); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-dpm-blue text-white flex flex-col shadow-2xl">
            <div class="p-8 text-center border-b border-blue-800">
                <div class="w-24 h-24 bg-white rounded-xl mx-auto mb-4 flex items-center justify-center p-2 shadow-inner">
                    <img src="IMG_7055.jpg" alt="Logo DPM" class="max-h-full object-contain">
                </div>
                <h1 class="text-sm font-black uppercase tracking-widest leading-tight">Dewan Perwakilan Mahasiswa</h1>
                <p class="text-[11px] text-blue-300 font-semibold mt-1">FAKULTAS HUKUM UNHAS</p>
            </div>
            
            <nav class="flex-1 mt-8 space-y-2 px-4">
                <button onclick="switchTab('masuk')" id="nav-masuk" class="w-full flex items-center px-6 py-3 rounded-lg bg-dpm-red transition-all duration-300 shadow-lg">
                    <i class="fas fa-file-import mr-3 text-lg"></i> Surat Masuk
                </button>
                <button onclick="switchTab('keluar')" id="nav-keluar" class="w-full flex items-center px-6 py-3 rounded-lg hover:bg-red-800 transition-all duration-300">
                    <i class="fas fa-file-export mr-3 text-lg"></i> Surat Keluar
                </button>
            </nav>

            <div class="p-6 text-[10px] text-blue-400 text-center uppercase tracking-tighter">
                &copy; 2026 DPM FH-UH Archive System
            </div>
        </aside>

        <main class="flex-1 flex flex-col">
            <header class="bg-white px-10 py-6 flex justify-between items-center border-b-4 border-dpm-red">
                <div>
                    <h2 id="view-title" class="text-3xl font-extrabold text-gray-800 tracking-tight">Arsip Surat Masuk</h2>
                    <p class="text-sm text-gray-500 font-medium">Manajemen dokumentasi digital DPM FH-UH</p>
                </div>
                <button onclick="openModal()" class="bg-dpm-red hover:bg-red-700 text-white font-bold px-6 py-3 rounded-full flex items-center shadow-lg transform hover:scale-105 transition-all">
                    <i class="fas fa-plus-circle mr-2 text-xl"></i> Tambah Surat Baru
                </button>
            </header>

            <section class="p-10 overflow-y-auto">
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-100 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-600 uppercase tracking-wider">No. Surat</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-600 uppercase tracking-wider">Perihal</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-600 uppercase tracking-wider">Tanggal</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-600 uppercase tracking-wider">File</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-600 uppercase tracking-wider text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="letter-table-body" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-input" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white w-[500px] rounded-3xl shadow-2xl overflow-hidden transform transition-all scale-100 border-t-8 border-dpm-red">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black text-dpm-blue uppercase">Input Arsip Baru</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-red-600"><i class="fas fa-times text-xl"></i></button>
                </div>
                
                <form id="form-surat" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Nomor Surat</label>
                        <input type="text" id="nomor-surat" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-dpm-blue outline-none transition" placeholder="Contoh: 001/A/DPM-FHUH/...">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Perihal</label>
                        <input type="text" id="perihal" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-dpm-blue outline-none transition" placeholder="Isi perihal surat...">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-dpm-blue outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Unggah File (Arsip)</label>
                        <div class="flex items-center justify-center w-full">
                            <label class="flex flex-col w-full h-24 border-4 border-dashed border-gray-200 hover:bg-gray-50 hover:border-dpm-red group transition-all rounded-xl cursor-pointer">
                                <div class="flex flex-col items-center justify-center pt-5">
                                    <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 group-hover:text-dpm-red"></i>
                                    <p id="filename-preview" class="pt-1 text-sm text-gray-400 group-hover:text-dpm-red">Pilih file dari laptop</p>
                                </div>
                                <input type="file" id="file-input" class="hidden" onchange="updateFileName(this)">
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-dpm-blue text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-900 transition-all uppercase tracking-widest">
                        Simpan ke Arsip
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'masuk';
        let db = JSON.parse(localStorage.getItem('dpm_archive')) || { masuk: [], keluar: [] };

        function switchTab(type) {
            currentTab = type;
            const title = document.getElementById('view-title');
            const navMasuk = document.getElementById('nav-masuk');
            const navKeluar = document.getElementById('nav-keluar');

            if (type === 'masuk') {
                title.innerText = "Arsip Surat Masuk";
                navMasuk.className = "w-full flex items-center px-6 py-3 rounded-lg bg-dpm-red text-white shadow-lg";
                navKeluar.className = "w-full flex items-center px-6 py-3 rounded-lg hover:bg-red-800 text-white transition-all";
            } else {
                title.innerText = "Arsip Surat Keluar";
                navKeluar.className = "w-full flex items-center px-6 py-3 rounded-lg bg-dpm-red text-white shadow-lg";
                navMasuk.className = "w-full flex items-center px-6 py-3 rounded-lg hover:bg-red-800 text-white transition-all";
            }
            renderTable();
        }

        function openModal() {
            document.getElementById('modal-input').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-input').classList.add('hidden');
            document.getElementById('form-surat').reset();
            document.getElementById('filename-preview').innerText = "Pilih file dari laptop";
        }

        function updateFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : "Pilih file dari laptop";
            document.getElementById('filename-preview').innerText = fileName;
        }

        document.getElementById('form-surat').onsubmit = function(e) {
            e.preventDefault();
            
            const newEntry = {
                id: Date.now(),
                nomor: document.getElementById('nomor-surat').value,
                perihal: document.getElementById('perihal').value,
                tanggal: document.getElementById('tanggal').value,
                file: document.getElementById('file-input').files[0] ? document.getElementById('file-input').files[0].name : 'No File'
            };

            db[currentTab].push(newEntry);
            localStorage.setItem('dpm_archive', JSON.stringify(db));
            
            renderTable();
            closeModal();
        };

        function deleteEntry(id) {
            if(confirm('Hapus arsip ini?')) {
                db[currentTab] = db[currentTab].filter(item => item.id !== id);
                localStorage.setItem('dpm_archive', JSON.stringify(db));
                renderTable();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('letter-table-body');
            tbody.innerHTML = '';

            db[currentTab].forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="px-6 py-4 font-bold text-dpm-blue">${item.nomor}</td>
                        <td class="px-6 py-4 text-sm">${item.perihal}</td>
                        <td class="px-6 py-4 text-sm text-gray-500">${item.tanggal}</td>
                        <td class="px-6 py-4 text-xs font-semibold text-red-600"><i class="fas fa-file-pdf mr-1"></i> ${item.file}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteEntry(${item.id})" class="text-gray-300 hover:text-red-600 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            if (db[currentTab].length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-gray-400 italic">Belum ada arsip surat.</td></tr>';
            }
        }

        // Jalankan saat pertama kali dibuka
        renderTable();
    </script>
</body>
</html>
